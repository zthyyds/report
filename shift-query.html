<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网点派仓班次查询</title>
<style>
:root {
  --black: #1a1a1a;
  --white: #ffffff;
  --gray-50: #f9f9f9;
  --gray-100: #f0f0f0;
  --gray-200: #e0e0e0;
  --gray-300: #ccc;
  --gray-600: #666;
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --border-thick: 3px solid var(--black);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "SF Pro Display", -apple-system, "Helvetica Neue", "Microsoft YaHei", sans-serif;
  background: var(--gray-50);
  color: var(--black);
  min-height: 100vh;
  line-height: 1.5;
}
.header {
  background: var(--black);
  color: var(--white);
  padding: 32px 24px 28px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: "";
  position: absolute;
  top: -40px; right: -40px;
  width: 200px; height: 200px;
  border: 3px solid rgba(255,255,255,0.15);
  transform: rotate(45deg);
}
.header::after {
  content: "";
  position: absolute;
  bottom: -60px; right: 40px;
  width: 120px; height: 120px;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 50%;
}
.header h1 {
  font-size: clamp(18px, 5vw, 26px);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}
.header .subtitle {
  font-size: clamp(11px, 3vw, 13px);
  color: var(--gray-300);
  margin-top: 8px;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
}
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 16px 24px;
  max-width: 948px;
  margin: 0 auto;
}
.stat-card {
  flex: 1;
  background: var(--white);
  border: 2px solid var(--black);
  padding: 14px 16px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1.2;
}
.stat-card .stat-label {
  font-size: 11px;
  color: var(--gray-600);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 4px;
}
.search-section {
  background: var(--white);
  border-top: var(--border-thick);
  border-bottom: var(--border-thick);
  padding: 20px 24px;
}
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 900px;
  margin: 0 auto;
  flex-wrap: wrap;
}
.search-bar label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  white-space: nowrap;
  padding: 6px 12px;
  background: var(--black);
  color: var(--white);
}
.search-bar input {
  flex: 1;
  min-width: 120px;
  padding: 10px 14px;
  border: 2px solid var(--black);
  border-radius: 0;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  transition: background 0.15s;
}
.search-bar input:focus {
  background: #e8f0fe;
  border-color: var(--accent);
}
.search-bar button {
  padding: 10px 28px;
  background: var(--black);
  color: var(--white);
  border: 2px solid var(--black);
  border-radius: 0;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.search-bar button:hover {
  background: var(--accent);
  border-color: var(--accent);
}
.result-info {
  padding: 12px 24px;
  font-size: 13px;
  color: var(--gray-600);
  font-weight: 500;
  max-width: 948px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.result-info::before {
  content: "";
  width: 4px;
  height: 14px;
  background: var(--accent);
  display: inline-block;
}
.table-wrap {
  padding: 0 24px 24px;
  max-width: 948px;
  margin: 0 auto;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: var(--white);
  border: var(--border-thick);
  font-size: 14px;
}
thead th {
  background: var(--black);
  color: var(--white);
  font-weight: 700;
  padding: 12px 14px;
  text-align: left;
  white-space: nowrap;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-size: 12px;
  border-right: 1px solid rgba(255,255,255,0.2);
}
thead th:last-child { border-right: none; }
tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--gray-100);
  border-right: 1px solid var(--gray-100);
  white-space: nowrap;
  font-size: 13px;
}
tbody td:last-child { border-right: none; }
tbody tr:hover { background: #e8f0fe; }
tbody tr:nth-child(even) { background: var(--gray-50); }
tbody tr:nth-child(even):hover { background: #e8f0fe; }
.no-data {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-600);
  font-size: 14px;
}
.geo-line {
  height: 4px;
  background: repeating-linear-gradient(
    90deg,
    var(--black) 0px,
    var(--black) 12px,
    transparent 12px,
    transparent 20px
  );
}
.query-count-section {
  max-width: 948px;
  margin: 0 auto;
  padding: 20px 24px;
}
.query-count-section h2 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.count-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.count-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--white);
  border: 2px solid var(--black);
  font-size: 13px;
  font-weight: 600;
}
.count-tag .count-num {
  background: var(--accent);
  color: var(--white);
  padding: 1px 8px;
  font-size: 12px;
  font-weight: 700;
}
.no-count {
  text-align: center;
  padding: 16px;
  color: var(--gray-600);
  font-size: 13px;
}
.footer {
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: var(--gray-300);
  letter-spacing: 1px;
}
@media (max-width: 640px) {
  .header { padding: 24px 16px 20px; }
  .header::before { width: 100px; height: 100px; top: -20px; right: -20px; }
  .header::after { width: 60px; height: 60px; bottom: -30px; right: 20px; }
  .stats-bar { padding: 12px 16px; gap: 8px; }
  .stat-card { padding: 10px 8px; }
  .stat-card .stat-value { font-size: 22px; }
  .stat-card .stat-label { font-size: 10px; }
  .search-section { padding: 14px 16px; }
  .search-bar { flex-direction: column; align-items: stretch; gap: 0; }
  .search-bar label { text-align: center; }
  .search-bar input { border-bottom: none; padding: 12px 14px; }
  .search-bar button { padding: 14px; border-top: 2px solid var(--black); }
  .result-info { padding: 12px 16px; }
  .table-wrap { padding: 0 8px 16px; margin: 0; max-width: 100%; }
  table { font-size: 13px; border-width: 2px; }
  thead th, tbody td { padding: 8px 10px; font-size: 12px; }
  .query-count-section { padding: 16px; }
}
</style>
</head>

<div class="header">

<div class="geo-line"></div>
<div class="stats-bar">

<div class="result-info" id="resultInfo"></div>
<div class="table-wrap">

</div>
<div class="geo-line"></div>
<div class="query-count-section">
  <h2>网点查询次数</h2>
  <div class="count-list" id="countList"></div>
  <div class="no-count" id="noCount">暂无查询记录</div>
</div>
<div class="geo-line"></div>
<div class="footer">网点派仓班次查询系统</div>

(function trackView() {
  var today = new Date().toISOString().slice(0, 10);
  var views = JSON.parse(localStorage.getItem("shift_views") || "{}");
  if (views.date !== today) { views = { date: today, count: 0, queries: 0 }; }
  views.count++;
  localStorage.setItem("shift_views", JSON.stringify(views));
  document.getElementById("todayViews").textContent = views.count;
  document.getElementById("todayQueries").textContent = views.queries || 0;
})();
(function countNets() {
  var nets = {};
  DATA.forEach(function(r) { if (r[4]) nets[r[4]] = true; });
  document.getElementById("totalNets").textContent = Object.keys(nets).length;
})();
function doSearch() {
  var keyword = document.getElementById("searchInput").value.trim().toUpperCase();
  var tbody = document.getElementById("resultBody");
  var table = document.getElementById("resultTable");
  var noData = document.getElementById("noData");
  var info = document.getElementById("resultInfo");
  if (!keyword) {
    info.textContent = "";
    table.style.display = "none";
    noData.style.display = "none";
    return;
  }
  var results = DATA.filter(function(row) {
    return row[4] && row[4].toUpperCase().indexOf(keyword) !== -1;
  });
  tbody.innerHTML = "";
  if (results.length === 0) {
    table.style.display = "none";
    noData.style.display = "block";
    info.textContent = "共 0 条结果";
    addCount(keyword, 0);
    return;
  }
  noData.style.display = "none";
  table.style.display = "table";
  info.textContent = "共 " + results.length + " 条结果";
  results.forEach(function(row) {
    var tr = document.createElement("tr");
    tr.innerHTML =
      "<td>" + (row[4] || "") + "</td>" +
      "<td>" + (row[5] || "") + "</td>" +
      "<td>" + (row[2] || "") + "</td>" +
      "<td>" + formatTime(row[9]) + "</td>" +
      "<td>" + formatTime(row[10]) + "</td>" +
      "<td>" + formatTime(row[11]) + "</td>";
    tbody.appendChild(tr);
  });
  addCount(keyword, results.length);
}
function formatTime(t) {
  if (!t) return "";
  var s = String(t);
  if (s.length === 4 && /^\d{4}$/.test(s)) {
    return s.substring(0, 2) + ":" + s.substring(2);
  }
  return s;
}
function addCount(keyword, count) {
  var views = JSON.parse(localStorage.getItem("shift_views") || "{}");
  views.queries = (views.queries || 0) + 1;
  localStorage.setItem("shift_views", JSON.stringify(views));
  document.getElementById("todayQueries").textContent = views.queries;
  var counts = JSON.parse(localStorage.getItem("shift_net_counts") || "{}");
  counts[keyword] = (counts[keyword] || 0) + 1;
  localStorage.setItem("shift_net_counts", JSON.stringify(counts));
  renderCounts(counts);
}
function renderCounts(counts) {
  var el = document.getElementById("countList");
  var noEl = document.getElementById("noCount");
  el.innerHTML = "";
  var keys = Object.keys(counts);
  if (keys.length === 0) {
    noEl.style.display = "block";
    return;
  }
  noEl.style.display = "none";
  keys.sort(function(a, b) { return counts[b] - counts[a]; });
  keys.forEach(function(k) {
    var tag = document.createElement("div");
    tag.className = "count-tag";
    tag.innerHTML = k + '<span class="count-num">' + counts[k] + '</span>';
    el.appendChild(tag);
  });
}
renderCounts(JSON.parse(localStorage.getItem("shift_net_counts") || "{}"));
document.getElementById("searchInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doSearch();
});
(function() {
  var params = new URLSearchParams(window.location.search);
  var q = params.get("q");
  if (q) { document.getElementById("searchInput").value = q; doSearch(); }
})();
