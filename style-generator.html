<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计风格灵感生成器</title>
<style>
:root {
  --main-color: #1a1a1a;
  --bg-color: #f9f9f9;
  --accent: #2563eb;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "SF Pro Display", -apple-system, "Helvetica Neue", "Microsoft YaHei", sans-serif;
  background: var(--bg-color);
  color: var(--main-color);
  min-height: 100vh;
  transition: all 0.6s ease;
}

/* Header */
.header {
  background: var(--main-color);
  color: #fff;
  padding: 40px 24px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: "";
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  border: 3px solid rgba(255,255,255,0.12);
  transform: rotate(45deg);
}
.header::after {
  content: "";
  position: absolute;
  bottom: -40px; left: 30px;
  width: 100px; height: 100px;
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 50%;
}
.header h1 {
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}
.header .subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-top: 8px;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
}

/* Style showcase */
.showcase {
  max-width: 800px;
  margin: 0 auto;
  padding: 32px 24px;
}
.style-card {
  border: 3px solid var(--main-color);
  overflow: hidden;
  margin-bottom: 24px;
  transition: all 0.6s ease;
}
.style-card-header {
  padding: 32px 24px;
  color: #fff;
  text-align: center;
  position: relative;
}
.style-card-header::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.15;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 10px,
    rgba(255,255,255,0.1) 10px,
    rgba(255,255,255,0.1) 20px
  );
}
.style-card-header h2 {
  font-size: clamp(20px, 4vw, 28px);
  font-weight: 700;
  position: relative;
  z-index: 1;
}
.style-card-header .category-tag {
  display: inline-block;
  padding: 4px 12px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  font-size: 12px;
  margin-top: 12px;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
}
.style-card-body {
  padding: 24px;
  background: #fff;
}
.style-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.info-item {
  padding: 16px;
  border: 1px solid #f0f0f0;
}
.info-label {
  font-size: 11px;
  color: #999;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.info-value {
  font-size: 16px;
  font-weight: 600;
}
.color-swatches {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.swatch {
  width: 40px;
  height: 40px;
  border: 2px solid #e0e0e0;
  border-radius: 4px;
}

/* All styles list */
.all-styles-section {
  padding: 0 24px 32px;
  max-width: 800px;
  margin: 0 auto;
}
.all-styles-section h3 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-left: 4px;
}
.category-group {
  margin-bottom: 20px;
}
.category-title {
  font-size: 12px;
  color: #999;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-left: 4px;
}
.style-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.style-tag {
  display: inline-block;
  padding: 6px 12px;
  border: 1.5px solid #e0e0e0;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 0;
}
.style-tag:hover {
  border-color: var(--main-color);
  background: var(--main-color);
  color: #fff;
}
.style-tag.active {
  background: var(--main-color);
  color: #fff;
  border-color: var(--main-color);
}

/* CTA Button */
.cta-section {
  text-align: center;
  padding: 24px;
}
.cta-btn {
  display: inline-block;
  padding: 14px 40px;
  background: var(--main-color);
  color: #fff;
  border: 2px solid var(--main-color);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 0;
}
.cta-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
}

/* Geo line */
.geo-line {
  height: 4px;
  background: repeating-linear-gradient(
    90deg,
    var(--main-color) 0px,
    var(--main-color) 12px,
    transparent 12px,
    transparent 20px
  );
}

/* Footer */
.footer {
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: #ccc;
  letter-spacing: 1px;
}

/* Mobile */
@media (max-width: 640px) {
  .header { padding: 28px 16px 24px; }
  .showcase { padding: 20px 16px; }
  .style-card-header { padding: 24px 16px; }
  .style-card-body { padding: 16px; }
  .style-info { grid-template-columns: 1fr; }
  .all-styles-section { padding: 0 16px 24px; }
  .cta-btn { padding: 12px 32px; font-size: 13px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>设计风格灵感生成器</h1>
  <div class="subtitle">110种风格，每次随机一种，激发你的创意灵感</div>

<div class="geo-line"></div>

        <div class="info-item">

        <div class="info-item">

        <div class="info-item">
          <div class="info-label">强调色</div>
          <div class="color-swatches" id="colorSwatch2"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="cta-section">
  <button class="cta-btn" id="refreshBtn" onclick="randomStyle()">换一种风格</button>
</div>
<div class="geo-line"></div>

<div class="all-styles-section">
  <h3>全部 110 种风格</h3>
  <div id="allStylesList"></div>
</div>
<div class="geo-line"></div>
<div class="footer">设计风格灵感生成器 -- 修改建议联系：ZTH【禁止外传】</div>

var currentIndex = -1;

function randomStyle() {
  var newIndex;
  do {
    newIndex = Math.floor(Math.random() * STYLES.length);
  } while (newIndex === currentIndex && STYLES.length > 1);
  currentIndex = newIndex;
  showStyle(newIndex);
}

function showStyle(idx) {
  var s = STYLES[idx];
  document.getElementById('styleName').textContent = s.name;
  document.getElementById('categoryTag').textContent = s.category;
  document.getElementById('infoCategory').textContent = s.category;
  document.getElementById('infoNumber').textContent = '#' + (idx + 1);

  // Color swatches
  var sw1 = document.getElementById('colorSwatch1');
  var sw2 = document.getElementById('colorSwatch2');
  sw1.innerHTML = '<div class="swatch" style="background:' + s.color + '"></div>';
  sw2.innerHTML = '<div class="swatch" style="background:' + s.accent + '"></div>';

  // Dynamic CSS variables
  document.documentElement.style.setProperty('--main-color', s.color);
  document.documentElement.style.setProperty('--accent', s.accent);

  // Background handling
  var bg = s.bg;
  if (bg.indexOf('gradient') > -1) {
    document.body.style.background = bg;
  } else {
    document.body.style.background = bg;
  }

  // Update header background
  document.querySelector('.header').style.background = s.bg.indexOf('gradient') > -1 ? s.bg : s.color;

  // Update active tag
  var tags = document.querySelectorAll('.style-tag');
  for (var i = 0; i < tags.length; i++) {
    tags[i].classList.toggle('active', i === idx);
  }

  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildList() {
  var container = document.getElementById('allStylesList');
  var categories = ['经典基础', '行业专属', '潮流创意', '细分氛围'];
  var html = '';
  for (var c = 0; c < categories.length; c++) {
    html += '<div class="category-group">';
    html += '<div class="category-title">' + categories[c] + '</div>';
    html += '<div class="style-grid">';
    for (var i = 0; i < STYLES.length; i++) {
      if (STYLES[i].category === categories[c]) {
        html += '<span class="style-tag" onclick="showStyle(' + i + ')">' + STYLES[i].name + '</span>';
      }
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

buildList();
randomStyle();
</script>
