<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>降雨预警</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;background:#0a1628;color:#e0e7ef;font-size:14px;line-height:1.5}
.header{height:48px;background:#0a0f1e;display:flex;align-items:center;justify-content:center;padding:0 16px;border-bottom:1px solid rgba(100,116,139,0.15);position:relative}
.header h1{font-size:16px;font-weight:800;color:#f1f5f9;letter-spacing:1px}
.header .time{color:#64748b;font-size:12px;position:absolute;right:16px;font-variant-numeric:tabular-nums}
.wrap{padding:12px}
.card{background:#111827;border:1px solid rgba(100,116,139,0.12);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:700;color:#93c5fd;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(100,116,139,0.1);display:flex;align-items:center;gap:6px}
.card-title i{width:3px;height:12px;border-radius:2px;background:#3b82f6;display:inline-block;flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{text-align:center;background:rgba(30,41,59,0.8);border-radius:8px;padding:10px 4px;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.red::after{background:#ef4444}.stat.orange::after{background:#f97316}.stat.yellow::after{background:#eab308}.stat.blue::after{background:#3b82f6}
.stat .n{font-size:26px;font-weight:800;line-height:1.1}
.stat.red .n{color:#fca5a5}.stat.orange .n{color:#fdba74}.stat.yellow .n{color:#fde047}.stat.blue .n{color:#93c5fd}
.stat .l{font-size:10px;color:#64748b;margin-top:2px;font-weight:600}
.alert{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:5px;border:1px solid}
.alert.red{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.15)}
.alert.orange{background:rgba(249,115,22,0.06);border-color:rgba(249,115,22,0.15)}
.alert.yellow{background:rgba(234,179,8,0.06);border-color:rgba(234,179,8,0.12)}
.alert .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.alert.red .d{background:#ef4444}.alert.orange .d{background:#f97316}.alert.yellow .d{background:#eab308}
.alert .t{font-size:12px;color:#94a3b8;font-weight:500;line-height:1.4}
.alert .t b{color:#cbd5e1}
.city{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(100,116,139,0.06)}
.city:last-child{border-bottom:none}
.city .cn{font-size:12px;font-weight:600;min-width:38px;color:#e2e8f0}
.city .bar{flex:1;height:4px;background:rgba(100,116,139,0.1);border-radius:2px;overflow:hidden;margin:0 8px}
.city .bf{height:100%;border-radius:2px}
.city .mm{font-size:11px;font-weight:700;min-width:60px;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.footer{font-size:10px;color:#334155;text-align:center;padding:8px 0 16px;letter-spacing:1px}
.map-wrap{position:relative;width:100%;padding-top:56%;background:#0d1321;border-radius:12px;overflow:hidden;border:1px solid rgba(100,116,139,0.12)}
.map-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%}
.map-label{font-size:9px;fill:#94a3b8;text-anchor:middle;font-family:"Microsoft YaHei",sans-serif}
</style>
</head>

var levelMap={'红色':'#ef4444','橙色':'#f97316','黄色':'#eab308'};
var rc=cityData.filter(function(c){return c.level==='红色'}).length;
var oc=cityData.filter(function(c){return c.level==='橙色'}).length;
var yc=cityData.filter(function(c){return c.level==='黄色'}).length;
var now=new Date();
document.getElementById('ht').textContent=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
var redCities=cityData.filter(function(c){return c.level==='红色'}).map(function(c){return c.name}).join('、');
var orangeCities=cityData.filter(function(c){return c.level==='橙色'}).map(function(c){return c.name}).join('、');
var yellowCities=cityData.filter(function(c){return c.level==='黄色'}).map(function(c){return c.name}).join('、');

});
