":"中雨","mm":"今15 明20","wind":"偏南风3~4级","temp":"--","level":"黄色"},{"name":"北京","value":[116.4,39.9,1],"code":"010","rain":"雷阵雨","mm":"今5 明10","wind":"偏南风2~3级","temp":"35~36","level":"黄色"},{"name":"上海","value":[121.47,31.23,1],"code":"021","rain":"多云有阵雨","mm":"今0 明10","wind":"西南风3~4级","temp":"38~39","level":"黄色"},{"name":"南京","value":[118.8,32.06,1],"code":"025","rain":"多云","mm":"今0 明5","wind":"西南风3~4级","temp":"35~36","level":"黄色"},{"name":"杭州","value":[120.16,30.28,1],"code":"571","rain":"多云","mm":"今0 明8","wind":"南风3级","temp":"37~38","level":"黄色"},{"name":"合肥","value":[117.27,31.86,1],"code":"551","rain":"多云","mm":"今0 明5","wind":"南风3~4级","temp":"36~37","level":"黄色"},{"name":"成都","value":[104.07,30.67,1],"code":"028","rain":"雷阵雨","mm":"今10 明20","wind":"微风","temp":"--","level":"黄色"},{"name":"长沙","value":[112.94,28.23,1],"code":"731","rain":"多云有阵雨","mm":"今5 明10","wind":"南风3级","temp":"36~37","level":"黄色"},{"name":"南昌","value":[115.89,28.68,1],"code":"791","rain":"多云有阵雨","mm":"今5 明15","wind":"南风3~4级","temp":"36~37","level":"黄色"}];
var levelMap = {'红色':'#ef4444','橙色':'#f97316','黄色':'#eab308'};
console.log('cityData loaded:', cityData.length, 'cities');
console.log('levelMap:', JSON.stringify(levelMap));

function updateTime(){
  var now=new Date();
  var ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var el=document.getElementById('headerTime');
  if(el) el.textContent=ts;
}

function buildLeftPanel(){
  var rc=cityData.filter(function(c){return c.level==='红色'}).length;
  var oc=cityData.filter(function(c){return c.level==='橙色'}).length;
  var yc=cityData.filter(function(c){return c.level==='黄色'}).length;
  var tc=cityData.length;
  var h='<div class="panel-title"><span class="icon"></span>预警统计</div><div class="stat-grid">';
  h+='<div class="stat-box red"><div class="num">'+rc+'</div><div class="label">红色预警</div></div>';
  h+='<div class="stat-box orange"><div class="num">'+oc+'</div><div class="label">橙色预警</div></div>';
  h+='<div class="stat-box yellow"><div class="num">'+yc+'</div><div class="label">黄色预警</div></div>';
  h+='<div class="stat-box blue"><div class="num">'+tc+'</div><div class="label">影响城市</div></div>';
  h+='</div>';
  h+='<div class="panel-title"><span class="icon"></span>预警信息</div><div class="alert-list">';
  if(rc) h+='<div class="alert-row red"><span class="a-dot"></span><span class="a-label">红色</span><span class="a-text"><b>'+rc+'城</b> '+cityData.filter(function(c){return c.level==='红色'}).map(function(c){return c.name}).join('、')+' 暴雨</span></div>';
  if(oc) h+='<div class="alert-row orange"><span class="a-dot"></span><span class="a-label">橙色</span><span class="a-text"><b>'+oc+'城</b> '+cityData.filter(function(c){return c.level==='橙色'}).map(function(c){return c.name}).join('、')+' 大雨</span></div>';
  if(yc) h+='<div class="alert-row yellow"><span class="a-dot"></span><span class="a-label">黄色</span><span class="a-text"><b>'+yc+'城</b> '+cityData.filter(function(c){return c.level==='黄色'}).map(function(c){return c.name}).join('、')+' 中雨</span></div>';
  h+='</div>';
  h+='<div class="panel-title"><span class="icon"></span>城市降雨量</div><div class="city-list">';
  var sorted=cityData.slice().sort(function(a,b){
    var m1=a.mm.match(/\d+/);var m2=b.mm.match(/\d+/);
    return (m2?parseInt(m2[0]):0)-(m1?parseInt(m1[0]):0);
  });
  var maxMm=parseInt(sorted[0]&&sorted[0].mm.match(/\d+/))||60;
  sorted.forEach(function(c){
    var mmMatch=c.mm.match(/\d+/);var mm=mmMatch?parseInt(mmMatch[0]):0;
    var pct=Math.max(5,(mm/maxMm*100));
    h+='<div class="city-row"><span class="c-name">'+c.name+'</span><span class="c-code">'+c.code+'</span><div class="c-bar"><div class="c-fill" style="width:'+pct+'%;background:'+levelMap[c.level]+'"></div></div><span class="c-mm" style="color:'+levelMap[c.level]+'">'+c.mm+'</span><span class="c-unit">mm</span></div>';
  });
  h+='</div><div class="footer">数据来源：中央气象台</div>';
  document.getElementById('leftPanel').innerHTML=h;
}

function buildRightPanel(){
  var h='<div class="panel-title"><span class="icon"></span>降雨量分布</div><div class="right-inner"><div class="bar-list">';
  var sorted=cityData.slice().sort(function(a,b){
    var m1=a.mm.match(/\d+/);var m2=b.mm.match(/\d+/);
    return (m2?parseInt(m2[0]):0)-(m1?parseInt(m1[0]):0);
  });
  var maxMm=parseInt(sorted[0]&&sorted[0].mm.match(/\d+/))||60;
  sorted.forEach(function(c){
    var mmMatch=c.mm.match(/\d+/);var mm=mmMatch?parseInt(mmMatch[0]):0;
    var pct=Math.max(5,(mm/maxMm*100));
    h+='<div class="bar-row"><span class="b-name">'+c.name+'</span><span class="b-code">'+c.code+'</span><div class="b-bar"><div class="b-fill" style="width:'+pct+'%;background:'+levelMap[c.level]+'"></div></div><span class="b-mm" style="color:'+levelMap[c.level]+'">'+c.mm+'mm</span></div>';
  });
  h+='</div><div class="footer">全国降雨模型预测系统 v2.0</div></div>';
  document.getElementById('rightPanel').innerHTML=h;
}

var chinaGeoUrl='https://raw.githubusercontent.com/echarts-maps/echarts-china-provinces-js/master/china.json';

function renderMap(){
  var el=document.getElementById('map');
  var chart=echarts.init(el,null,{renderer:'canvas'});
  fetch(chinaGeoUrl,{mode:'cors'}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(geo){
    echarts.registerMap('china',geo);
    var rc=cityData.filter(function(c){return c.level==='红色'}).length;
    var oc=cityData.filter(function(c){return c.level==='橙色'}).length;
    var yc=cityData.filter(function(c){return c.level==='黄色'}).length;
    document.getElementById('mapOverlay').innerHTML='<h3>预警统计</h3>'
      +'<div class="stat"><span class="dot" style="background:#ef4444"></span>红色 '+rc+'城</div>'
      +'<div class="stat"><span class="dot" style="background:#f97316"></span>橙色 '+oc+'城</div>'
      +'<div class="stat"><span class="dot" style="background:#eab308"></span>黄色 '+yc+'城</div>';
    chart.setOption({
      tooltip:{
        trigger:'item',
        backgroundColor:'rgba(15,23,42,0.96)',borderColor:'#3b82f6',borderWidth:1,
        textStyle:{color:'#e2e8f0',fontSize:13,fontFamily:'Noto Sans SC,Microsoft YaHei'},
        formatter:function(p){
          if(p.seriesName==='城市'){
            var d=p.data;
            return '<div style="padding:4px"><div style="font-size:15px;font-weight:700;color:#3b82f6;margin-bottom:4px">'+d.name+'</div>'
              +'<div>天气：<b>'+d.rain+'</b></div>'
              +'<div>降雨：<span style="color:'+levelMap[d.level]+'">'+d.mm+'mm</span></div>'
              +'<div style="font-size:12px;color:#94a3b8">预警：'+d.level+'</div></div>';
          }
          return p.name;
        }
      },
      geo:{
        map:'china',roam:false,zoom:1.2,center:[105,36],
        itemStyle:{areaColor:'#1e3a5f',borderColor:'#2d5a87',borderWidth:1,shadowColor:'rgba(0,0,0,0.3)',shadowBlur:10},
        emphasis:{itemStyle:{areaColor:'#2d5a87',borderColor:'#4a90d9',borderWidth:1.5},label:{show:false}},
        label:{show:false},silent:false
      },
      series:[{
        name:'城市',type:'scatter',coordinateSystem:'geo',
        data:cityData.map(function(c){return{name:c.name,value:c.value,code:c.code,rain:c.rain,mm:c.mm,level:c.level};}),
        symbolSize:18,itemStyle:{color:'#fca5a5',shadowBlur:10,shadowColor:'rgba(252,165,165,0.5)'},
        label:{show:true,formatter:function(p){return p.data.code;},position:'bottom',color:'#94a3b8',fontSize:10,fontWeight:600},
        emphasis:{itemStyle:{color:'#fff',shadowBlur:20,shadowColor:'rgba(255,255,255,0.8)'},label:{show:true,formatter:'{b}',color:'#fff',fontSize:14,fontWeight:700}}
      },{
        name:'城市',type:'effectScatter',coordinateSystem:'geo',
        data:cityData.map(function(c){return{name:c.name,value:c.value,code:c.code,rain:c.rain,mm:c.mm,level:c.level};}).filter(function(d){return d.value[2]>=2;}),
        symbolSize:20,showEffectOn:'render',rippleEffect:{brushType:'stroke',scale:3},
        itemStyle:{color:'#f97316',shadowBlur:10,shadowColor:'rgba(249,115,22,0.5)'},
        label:{show:true,formatter:function(p){return p.data.code;},position:'bottom',color:'#fdba74',fontSize:10,fontWeight:700},
        emphasis:{itemStyle:{color:'#fff',shadowBlur:20,shadowColor:'rgba(255,255,255,0.8)'},label:{show:true,formatter:'{b}',color:'#fff',fontSize:14,fontWeight:700}},
        zlevel:1
      }]
    });
    window.addEventListener('resize',function(){chart.resize();});
  }).catch(function(e){
    console.error('地图GeoJSON加载失败:',e);
    document.getElementById('mapOverlay').innerHTML='<h3 style="color:#ef4444">地图加载失败</h3><div class="stat" style="color:#94a3b8">'+e.message+'</div>';
  });
}

function init(){
  updateTime();
  buildLeftPanel();
  buildRightPanel();
  renderMap();
}

if(document.readyState==='complete') init();
else window.addEventListener('load',init);
</script>
